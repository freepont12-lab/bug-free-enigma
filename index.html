<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي العباقرة</title>
    <style>
        body { font-family: sans-serif; background: #1b5e20; color: white; text-align: center; margin: 0; padding: 0; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
        .spinner { font-size: 60px; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .btn { display: block; width: 85%; margin: 10px auto; padding: 15px; background: #ffb300; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; }
        input { padding: 12px; width: 80%; border-radius: 10px; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner">⚽</div><p>جاري التحميل...</p></div>

<div id="login-screen" class="screen active">
    <h1>تحدي العباقرة</h1>
    <button class="btn" onclick="alert('تم ربط حسابك')">تسجيل دخول جوجل / فيسبوك</button>
    <button class="btn" onclick="showScreen('name-screen')">دخول كزائر</button>
</div>

<div id="name-screen" class="screen">
    <input type="text" id="username" placeholder="أدخل اسمك الكريم">
    <button class="btn" onclick="startGame()">بدء التحدي</button>
</div>

<div id="game-screen" class="screen">
    <h3 id="q-text"></h3>
    <div id="options-div"></div>
    <button class="btn" onclick="showScreen('shop-screen')">المتجر & الإعدادات</button>
</div>

<div id="shop-screen" class="screen">
    <h3>المتجر والمكافآت</h3>
    <button class="btn" onclick="getDaily()">🎁 مكافأة يومية (قلب)</button>
    <button class="btn" onclick="toggleSound()">🔊 الصوت: <span id="s-stat">ON</span></button>
    <p>لدعم المطور:</p>
    <a href="https://www.paypal.com/paypalme/YOUR_PAYPAL_LINK" target="_blank" style="color:yellow;">اضغط هنا لدعمي عبر PayPal</a>
    <button class="btn" style="background:#444; color:white;" onclick="showScreen('game-screen')">رجوع</button>
</div>

<script>
    const questions = [
        { q: "الهداف التاريخي لدوري الأبطال؟", o: ["ميسي", "رونالدو", "ليفاندوفسكي", "بنزيما"], c: 1 },
        { q: "بطل مونديال 2022؟", o: ["فرنسا", "البرازيل", "الأرجنتين", "المغرب"], c: 2 },
        { q: "عدد لاعبي كرة القدم الأساسيين؟", o: ["10", "11", "9", "12"], c: 1 },
        { q: "النادي الملكي؟", o: ["برشلونة", "ريال مدريد", "أتلتيكو", "فالنسيا"], c: 1 },
        { q: "ألقاب البرازيل؟", o: ["4", "5", "6", "3"], c: 1 },
        { q: "فريق صلاح؟", o: ["تشيلسي", "سيتي", "ليفربول", "يونايتد"], c: 2 },
        { q: "مونديال 2010؟", o: ["البرازيل", "جنوب أفريقيا", "ألمانيا", "روسيا"], c: 1 },
        { q: "من هو الظاهرة؟", o: ["رونالدينيو", "رونالدو", "كريستيانو", "روماريو"], c: 1 },
        { q: "لقب السيدة العجوز؟", o: ["ميلان", "إنتر", "يوفنتوس", "روما"], c: 2 },
        { q: "مدرب فيرغسون؟", o: ["مورينيو", "فيرغسون", "غوارديولا", "فينغر"], c: 1 },
        { q: "فريق ليفاندوفسكي قبل برشلونة؟", o: ["بايرن", "دورتموند", "لايبزيغ", "شالكه"], c: 0 },
        { q: "هداف المونديال؟", o: ["بيليه", "كلوزه", "رونالدو", "ميسي"], c: 1 },
        { q: "الكرة الذهبية 2022؟", o: ["مودريتش", "بنزيما", "مبابي", "هالاند"], c: 1 },
        { q: "جنسية هالاند؟", o: ["سويدي", "نرويجي", "دنماركي", "ألماني"], c: 1 },
        { q: "ملعب الريال؟", o: ["برنابيو", "كامب نو", "ميتروبوليتانو", "الميستايا"], c: 0 },
        { q: "مدافع فاز بالكرة الذهبية؟", o: ["راموس", "فان دايك", "كانافارو", "بويول"], c: 2 },
        { q: "ألقاب بايرن في الأبطال؟", o: ["5", "6", "7", "4"], c: 1 },
        { q: "بطل يورو 2020؟", o: ["إنجلترا", "إيطاليا", "إسبانيا", "فرنسا"], c: 1 },
        { q: "هداف الأرجنتين؟", o: ["مارادونا", "باتيستوتا", "ميسي", "أغويرو"], c: 2 },
        { q: "تأسيس فيفا؟", o: ["1904", "1920", "1930", "1899"], c: 0 },
        { q: "أفريقي فاز بالكرة الذهبية؟", o: ["إيتو", "دروغبا", "جورج وياه", "صلاح"], c: 2 },
        { q: "بطل أبطال 2021؟", o: ["سيتي", "تشيلسي", "ليفربول", "توتنهام"], c: 1 },
        { q: "أسرع هاتريك؟", o: ["ماني", "صلاح", "أغويرو", "ستيرلينغ"], c: 0 },
        { q: "أول مستضيف للمونديال؟", o: ["البرازيل", "الأرجنتين", "الأوروغواي", "إيطاليا"], c: 2 },
        { q: "هداف الدوري الإسباني؟", o: ["رونالدينيو", "ميسي", "راؤول", "بنزيمة"], c: 1 },
        { q: "نادي رونالدو الأول؟", o: ["بنفيكا", "بورتو", "سبورتينغ لشبونة", "براغا"], c: 2 },
        { q: "ألقاب ميلان بالأبطال؟", o: ["5", "7", "9", "6"], c: 1 },
        { q: "أكثر من شارك بالمونديال؟", o: ["ماتايوس", "ميسي", "كلوزه", "مالديني"], c: 0 },
        { q: "فريق فاز بالدوري بلا هزيمة 2004؟", o: ["يونايتد", "تشيلسي", "أرسنال", "سيتي"], c: 2 },
        { q: "مدرب ثلاثية الريال؟", o: ["أنشيلوتي", "زيدان", "مورينيو", "بينيتيز"], c: 1 },
        { q: "هداف فرنسا؟", o: ["هنري", "جيرو", "مبابي", "بلاتيني"], c: 1 },
        { q: "فريق السداسية 2009؟", o: ["ريال مدريد", "بايرن", "برشلونة", "يونايتد"], c: 2 },
        { q: "منتخب وصل لنصف نهائي 2002؟", o: ["اليابان", "السعودية", "كوريا", "إيران"], c: 2 },
        { q: "هداف الإنجليزي التاريخي؟", o: ["روني", "شيرر", "هنري", "هاري كين"], c: 1 },
        { q: "نادي رونالدينيو الأول؟", o: ["باريس", "موناكو", "مارسيليا", "ليون"], c: 0 },
        { q: "أكثر لاعب فاز بكأس العالم؟", o: ["مارادونا", "بيليه", "رونالدو", "زيدان"], c: 1 },
        { q: "بطل 1993 بالأبطال؟", o: ["ميلان", "برشلونة", "مارسيليا", "يوفنتوس"], c: 2 },
        { q: "صاحب 91 هدفاً بسنة؟", o: ["رونالدو", "ميسي", "بيليه", "مولر"], c: 1 },
        { q: "بطل ثلاثية 2010؟", o: ["يوفنتوس", "ميلان", "إنتر", "روما"], c: 2 },
        { q: "لقب كولومبيا؟", o: ["التانغو", "السامبا", "صناع القهوة", "الساموراي"], c: 2 },
        { q: "سجل في 5 مونديالات؟", o: ["ميسي", "رونالدو", "كلوزه", "بيليه"], c: 1 },
        { q: "بطل مونديال 1966؟", o: ["أمريكا", "إنجلترا", "البرازيل", "إيطاليا"], c: 1 },
        { q: "هداف إسبانيا؟", o: ["راؤول", "فيا", "توريس", "إنييستا"], c: 1 },
        { q: "حارس فاز بالكرة الذهبية؟", o: ["بوفون", "كاسياس", "ياشين", "نوير"], c: 2 },
        { q: "ألقاب ليفربول؟", o: ["5", "6", "7", "8"], c: 1 },
        { q: "بطل إيطاليا 2023؟", o: ["ميلان", "إنتر", "نابولي", "لاتسيو"], c: 2 },
        { q: "أسرع هدف مونديالي؟", o: ["هاكان شوكور", "كلوزه", "بيليه", "مارادونا"], c: 0 },
        { q: "حارس الأخطبوط؟", o: ["كاسياس", "ياشين", "بوفون", "كان"], c: 2 },
        { q: "أكبر نتيجة مونديالية؟", o: ["10-1", "9-0", "8-0", "7-0"], c: 1 },
        { q: "ملعب نهائي 2022؟", o: ["لوسيل", "البيت", "خليفة", "الثمامة"], c: 0 }
    ];

    window.onload = () => setTimeout(() => document.getElementById('loader').style.display = 'none', 2000);
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function startGame() { showScreen('game-screen'); loadQ(0); }
    function loadQ(i) { 
        let q = questions[i]; 
        document.getElementById('q-text').innerText = (i+1) + "- " + q.q;
        let d = document.getElementById('options-div'); d.innerHTML = "";
        q.o.forEach((opt, idx) => {
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = opt;
            b.onclick = () => { if(i < questions.length-1) loadQ(i+1); else alert("انتهت اللعبة!"); };
            d.appendChild(b);
        });
    }
    let sound = true;
    function toggleSound() { sound = !sound; document.getElementById('s-stat').innerText = sound ? 'ON' : 'OFF'; }
    function getDaily() { alert("تم إضافة قلب واحد لرصيدك!"); }
</script>
</body>
</html>
